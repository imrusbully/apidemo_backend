server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: demo-backend

  flyway:
    enabled: true
    locations: classpath:db/migration

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
    username: ${DB_USER:demo}
    password: ${DB_PASS:demo}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # password: ${REDIS_PASSWORD:}
      # ssl: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET:dev-only-secret-change-me-dev-only-secret-change-me}
    ttlSeconds: 900
  refresh:
    pepper: ${AUTH_REFRESH_PEPPER:dev-only-refresh-pepper-change-me}
    ttlSeconds: ${AUTH_REFRESH_TTL_SECONDS:2592000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{requestId}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    org.flywaydb: DEBUG
  payload:
    enabled: ${APP_LOGGING_PAYLOAD_ENABLED:false}
    max-body-length: ${APP_LOGGING_PAYLOAD_MAX_BODY_LENGTH:4000}
    body-blacklist:
      - /api/v1/auth/public/otp/verify
      - /api/v1/auth/refresh
      - /api/v1/auth/logout
